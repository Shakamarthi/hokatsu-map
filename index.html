<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>西葛西・清新町 保育園候補マップ</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://tile.openstreetmap.org">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      --bg:#f3f6f9; --panel:#fff; --text:#152033; --muted:#647184; --line:#dce3eb;
      --licensed:#1769aa; --other:#e87919; --active:#152033;
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;background:var(--bg);color:var(--text)}
    body{padding-bottom:env(safe-area-inset-bottom)}
    header{position:sticky;top:0;z-index:1200;background:rgba(255,255,255,.97);border-bottom:1px solid var(--line);padding:calc(10px + env(safe-area-inset-top)) 14px 10px}
    h1{font-size:18px;margin:0 0 2px;line-height:1.35} .sub{font-size:12px;color:var(--muted)}
    .toolbar{display:flex;gap:8px;overflow:auto;padding:10px 12px;background:var(--panel);border-bottom:1px solid var(--line)}
    .toolbar button,.tabs button{border:1px solid #bcc7d3;background:#fff;border-radius:12px;min-height:44px;padding:0 14px;font-size:14px;white-space:nowrap}
    .toolbar button.active,.tabs button.active{background:var(--active);color:#fff;border-color:var(--active)}
    .tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px 12px;background:#fff}
    #status{font-size:12px;padding:7px 12px;background:#fff;color:var(--muted);border-bottom:1px solid var(--line)}
    #map{height:calc(100dvh - 188px);min-height:430px;width:100%;background:#e8edf2}
    #list{display:none;padding:10px 12px 28px}
    .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px;margin-bottom:10px}
    .head{display:flex;gap:8px;align-items:flex-start}.head h2{font-size:15px;margin:1px 0 0;flex:1}
    .badge{font-size:11px;padding:3px 8px;border-radius:999px;white-space:nowrap}.badge.licensed{background:#e7f1fb;color:#0d528b}.badge.other{background:#fff0df;color:#8d4800}
    .meta{font-size:13px;color:var(--muted);line-height:1.65;margin-top:8px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    .actions a,.actions button{min-height:44px;border:1px solid #bcc7d3;border-radius:11px;background:#fff;color:#075daa;text-decoration:none;display:flex;align-items:center;justify-content:center;font-size:13px}
    .empty{padding:24px;text-align:center;color:var(--muted)}
    .leaflet-container{font:14px/1.5 -apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif}
    .pin{width:28px;height:28px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.35);position:relative}
    .pin::after{content:"";position:absolute;width:8px;height:8px;border-radius:50%;background:#fff;top:8px;left:8px}.pin.blue{background:var(--licensed)}.pin.orange{background:var(--other)}
    .leaflet-div-icon{background:transparent;border:none}
    .leaflet-popup-content{margin:12px 14px;line-height:1.55}.leaflet-popup-content strong{display:block;margin-bottom:4px}
    .desktop-grid{display:block}
    @media(min-width:840px){
      header{position:static}.tabs{display:none}.desktop-grid{display:grid;grid-template-columns:minmax(0,2fr) minmax(320px,1fr);height:calc(100vh - 111px)}
      #mapPane{display:block!important}.listPane{display:block!important;overflow:auto;border-left:1px solid var(--line)}
      #map{height:100%}#list{display:block!important}.toolbar{grid-column:1/-1}.desktop-grid{position:relative}
      #status{position:absolute;left:10px;top:10px;z-index:900;border:1px solid var(--line);border-radius:9px;background:rgba(255,255,255,.95)}
    }
  </style>
</head>
<body>
<header>
  <h1>西葛西・清新町 保育園候補マップ</h1>
  <div class="sub">新規開発版 v1｜Safari・Edge・Chrome対応</div>
</header>
<div class="tabs" aria-label="表示切替">
  <button id="tabMap" class="active" type="button">地図</button>
  <button id="tabList" type="button">一覧</button>
</div>
<div class="toolbar" aria-label="施設区分フィルター">
  <button type="button" class="active" data-filter="all">全12園</button>
  <button type="button" data-filter="licensed">認可7園</button>
  <button type="button" data-filter="other">認可外5園</button>
</div>
<div class="desktop-grid">
  <section id="mapPane">
    <div id="status" role="status" aria-live="polite">地図を準備しています…</div>
    <div id="map" aria-label="西葛西・清新町の保育園候補地図"></div>
  </section>
  <section class="listPane"><div id="list"></div></section>
</div>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function(){
  'use strict';
  const facilities = [
    {name:'西葛西ちとせ保育園',kind:'認可',address:'東京都江戸川区西葛西2-17-15',lat:35.66810,lng:139.85660,status:'見学済'},
    {name:'キッズラボ西葛西園',kind:'認可',address:'東京都江戸川区西葛西8-4-13 1F',lat:35.65800,lng:139.85880,status:'見学済'},
    {name:'このえ清新町保育園',kind:'認可',address:'東京都江戸川区清新町2-7-8',lat:35.65510,lng:139.85280,status:'見学予定'},
    {name:'ふきのとう保育園',kind:'認可',address:'東京都江戸川区中葛西6-4-7',lat:35.66070,lng:139.86850,status:'見学済'},
    {name:'ほっぺるランド中葛西',kind:'認可',address:'東京都江戸川区中葛西1-1-15',lat:35.67380,lng:139.87230,status:'見学済'},
    {name:'グローバルキッズ宇喜田町園',kind:'認可',address:'東京都江戸川区宇喜田町1279',lat:35.67600,lng:139.86150,status:'見学済'},
    {name:'白百合保育園',kind:'認可',address:'東京都江戸川区北葛西4-3-9',lat:35.67440,lng:139.85520,status:'見学済'},
    {name:'HybridMom Nursery Preschool 清新町',kind:'認可外・企業主導型',address:'東京都江戸川区清新町2-2-20',lat:35.65680,lng:139.85070,status:'見学予定'},
    {name:'カメリアキッズ西葛西園',kind:'認可外・企業主導型',address:'東京都江戸川区西葛西6-8-4',lat:35.66300,lng:139.85970,status:'見学予定'},
    {name:'おれんじオハナ西葛西保育園',kind:'認可外・企業主導型',address:'東京都江戸川区西葛西5-8-3',lat:35.66630,lng:139.86210,status:'見学予定'},
    {name:'ぱずくる保育園',kind:'認可外・企業主導型',address:'東京都江戸川区西葛西3-13-13 ツインコート1F-B',lat:35.66735,lng:139.85810,status:'見学予定'},
    {name:'西葛西きらきら保育園',kind:'認可外・企業主導型',address:'東京都江戸川区西葛西6-17-1-206',lat:35.66375,lng:139.86045,status:'見学予定'}
  ];
  let map = null;
  let currentFilter = 'all';
  const markerRecords = [];
  const $ = id => document.getElementById(id);
  const googleMapsUrl = address => 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(address);
  const visibleFor = item => currentFilter === 'all' || (currentFilter === 'licensed' && item.kind === '認可') || (currentFilter === 'other' && item.kind !== '認可');

  function markerIcon(kind){
    const cls = kind === '認可' ? 'blue' : 'orange';
    return L.divIcon({className:'',html:'<div class="pin '+cls+'"></div>',iconSize:[30,30],iconAnchor:[15,29],popupAnchor:[0,-27]});
  }
  function escapeHtml(value){return String(value).replace(/[&<>'"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));}
  function popupHtml(item){
    return '<strong>'+escapeHtml(item.name)+'</strong>'+escapeHtml(item.address)+'<br>'+escapeHtml(item.status)+'<br><a target="_blank" rel="noopener" href="'+googleMapsUrl(item.address)+'">Google Mapsで確認</a>';
  }
  function initMap(){
    if(!window.L){$('status').textContent='地図ライブラリを読み込めませんでした。通信状態を確認してください。';return;}
    try{
      map = L.map('map',{zoomControl:true,preferCanvas:true}).setView([35.6645,139.8605],14);
      L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap contributors'}).addTo(map);
      facilities.forEach((item,index)=>{
        const marker = L.marker([item.lat,item.lng],{icon:markerIcon(item.kind),title:item.name,keyboard:true});
        marker.bindPopup(popupHtml(item));
        marker.addTo(map);
        markerRecords.push({item,index,marker});
      });
      fitVisibleMarkers();
      $('status').textContent='12件のピンを表示中';
      window.addEventListener('resize',()=>setTimeout(()=>map.invalidateSize(),100));
      setTimeout(()=>map.invalidateSize(),250);
    }catch(error){
      $('status').textContent='地図の初期化に失敗しました：'+error.message;
      console.error(error);
    }
  }
  function fitVisibleMarkers(){
    if(!map)return;
    const points = markerRecords.filter(r=>visibleFor(r.item)).map(r=>[r.item.lat,r.item.lng]);
    if(points.length) map.fitBounds(points,{padding:[28,28],maxZoom:15});
  }
  function renderList(){
    const list = $('list');
    list.innerHTML='';
    const shown = facilities.map((item,index)=>({item,index})).filter(x=>visibleFor(x.item));
    if(!shown.length){list.innerHTML='<div class="empty">表示対象がありません。</div>';return;}
    shown.forEach(({item,index})=>{
      const article=document.createElement('article');article.className='card';
      const badgeClass=item.kind==='認可'?'licensed':'other';
      article.innerHTML='<div class="head"><span class="badge '+badgeClass+'">'+escapeHtml(item.kind)+'</span><h2>'+escapeHtml(item.name)+'</h2></div><div class="meta">'+escapeHtml(item.address)+'<br>'+escapeHtml(item.status)+'</div><div class="actions"><a target="_blank" rel="noopener" href="'+googleMapsUrl(item.address)+'">Google Maps</a><button type="button" data-index="'+index+'">地図で表示</button></div>';
      list.appendChild(article);
    });
  }
  function applyFilter(){
    markerRecords.forEach(r=>{
      if(visibleFor(r.item)){if(!map.hasLayer(r.marker))r.marker.addTo(map);}else if(map.hasLayer(r.marker)){map.removeLayer(r.marker);}
    });
    renderList();fitVisibleMarkers();
    $('status').textContent=markerRecords.filter(r=>visibleFor(r.item)).length+'件のピンを表示中';
  }
  function showMap(){
    $('mapPane').style.display='block';document.querySelector('.listPane').style.display='none';$('tabMap').classList.add('active');$('tabList').classList.remove('active');
    setTimeout(()=>{if(map)map.invalidateSize();},120);
  }
  function showList(){
    $('mapPane').style.display='none';document.querySelector('.listPane').style.display='block';$('tabList').classList.add('active');$('tabMap').classList.remove('active');
  }
  $('tabMap').addEventListener('click',showMap);$('tabList').addEventListener('click',showList);
  document.querySelectorAll('[data-filter]').forEach(button=>button.addEventListener('click',()=>{
    currentFilter=button.dataset.filter;document.querySelectorAll('[data-filter]').forEach(x=>x.classList.toggle('active',x===button));applyFilter();
  }));
  $('list').addEventListener('click',event=>{
    const button=event.target.closest('button[data-index]');if(!button)return;
    const record=markerRecords.find(r=>r.index===Number(button.dataset.index));if(!record||!map)return;
    if(window.innerWidth<840)showMap();
    setTimeout(()=>{map.invalidateSize();map.setView(record.marker.getLatLng(),17);record.marker.openPopup();},160);
  });
  renderList();initMap();
})();
</script>
</body>
</html>
