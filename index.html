<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#f4f6f8"><title>保活管理システム v2.4</title><style>
:root{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;color:#172033;background:#f4f6f8;--b:#dce2ea;--m:#687383}*{box-sizing:border-box}body{margin:0;background:#f4f6f8;padding-bottom:28px}button,select,textarea,input{font:inherit}header{padding:18px;background:#fff;border-bottom:1px solid var(--b);position:sticky;top:0;z-index:5}h1{margin:0;font-size:22px}.sub{margin:4px 0 0;color:var(--m);font-size:13px}.wrap{max-width:980px;margin:auto;padding:14px;display:grid;gap:12px}.panel,.card{background:#fff;border:1px solid var(--b);border-radius:16px;padding:14px}.top{display:grid;gap:12px}.actions,.maps,.fa{display:grid;grid-template-columns:1fr 1fr;gap:8px}.btn,.actions a,.fa a{min-height:44px;border:1px solid #bcc6d0;border-radius:11px;background:#fff;color:#174f8d;text-decoration:none;display:flex;align-items:center;justify-content:center;font-weight:700}.primary{background:#172033!important;color:#fff!important}.status{margin-top:10px;padding:9px;border-radius:10px;background:#e8f5eb;color:#23613b;font-size:12px}.status[data-type=warning]{background:#fff6df;color:#755100}.status[data-type=error]{background:#fdeaea;color:#8a2b2b}.auth{margin-top:10px;padding:10px;background:#f8fafc;border:1px solid var(--b);border-radius:11px}.auth input{width:100%;padding:9px;border:1px solid #c7d0d9;border-radius:9px}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.metric{background:#f6f8fa;border-radius:12px;padding:10px;text-align:center}.metric b{display:block;font-size:20px}.metric span{font-size:11px;color:var(--m)}.prog{margin-top:11px}.progline{display:flex;justify-content:space-between;font-size:13px}.bar{height:9px;background:#e7ebef;border-radius:99px;overflow:hidden}.bar i{display:block;height:100%;background:#335f8c}.rank{padding-left:20px;line-height:1.8}.tools{display:flex;gap:7px;overflow:auto;margin-bottom:10px}.tools button{flex:none;min-height:38px;padding:0 12px;border:1px solid #bac4cf;border-radius:99px;background:#fff}.tools button.active{background:#172033;color:#fff}.grid{display:grid;gap:10px}.head{display:flex;gap:10px}.num{width:28px;height:28px;border-radius:50%;background:#eef2f6;display:flex;align-items:center;justify-content:center;font-weight:700}h3{margin:1px 0 6px;font-size:16px}.badges{display:flex;gap:5px;flex-wrap:wrap}.badge{font-size:11px;padding:3px 8px;border-radius:99px;background:#eef2f6}.address{font-size:13px;color:#3e4957}.seg{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}.seg button{min-height:38px;border:1px solid #c7d0d9;border-radius:9px;background:#fff}.seg button.active{background:#172033;color:#fff}.field{margin-top:11px}.field label{display:block;font-size:12px;color:var(--m);margin-bottom:5px}.stars button{border:0;background:transparent;font-size:29px;color:#c4cbd3;padding:0 2px}.stars button.on{color:#f1a400}select,textarea{width:100%;padding:9px;border:1px solid #c7d0d9;border-radius:9px;background:#fff}textarea{min-height:72px}.evalbtn{width:100%;min-height:42px;margin-top:10px;border:1px solid #9fb3c8;border-radius:10px;background:#f3f7fb;color:#174f8d;font-weight:700}.eval{margin-top:8px;padding:11px;border:1px solid var(--b);border-radius:11px;background:#f8fafc}.eval h4{margin:10px 0 5px;font-size:14px}.eval h4:first-child{margin-top:0}.eval p,.eval li{font-size:13px;line-height:1.55}.hidden{display:none!important}.note{font-size:11px;color:var(--m);margin-top:8px}@media(min-width:760px){.top{grid-template-columns:1fr 1fr}.grid{grid-template-columns:1fr 1fr}}
</style></head><body><header><h1>保活管理システム v2.4</h1><p class="sub">園一覧から見学評価を確認・管理</p></header><main class="wrap"><section class="top"><div class="panel"><h2>Googleマイマップ</h2><div class="maps"><a class="btn primary" href="https://www.google.com/maps/d/viewer?hl=ja&mid=1e-j7oInXYik7FxnCbqqKAr7oqHCAa7o" target="_blank">閲覧</a><a class="btn" href="https://www.google.com/maps/d/edit?hl=ja&mid=1e-j7oInXYik7FxnCbqqKAr7oqHCAa7o" target="_blank">編集</a></div></div><div class="panel"><h2>データ管理</h2><div class="actions"><button class="btn primary" id="save">GitHubへ保存</button><button class="btn" id="reload">再読込</button><button class="btn" id="export">JSON書出し</button><button class="btn" id="import">JSON読込</button><input id="file" type="file" accept=".json" hidden></div><div class="auth"><input id="token" type="password" placeholder="GitHub Fine-grained PAT"></div><div id="sync" class="status">GitHub正本を読込中…</div><div class="note">トークンはこのタブ内だけに保持します。</div></div></section><section class="panel"><h2>ダッシュボード</h2><div class="metrics"><div class="metric"><span>対象園</span><b id="total">0</b></div><div class="metric"><span>見学済</span><b id="done">0</b></div><div class="metric"><span>平均評価</span><b id="avg">-</b></div><div class="metric"><span>順位設定</span><b id="ranked">0</b></div></div><div id="progress"></div><h3>志望順位</h3><ol id="ranklist" class="rank"></ol></section><section class="panel"><h2>園別管理</h2><div class="tools" id="filters"></div><div class="tools" id="sorts"></div><div id="count" class="note"></div><div id="cards" class="grid"></div></section></main><script>
const O='shakamarthi',R='hokatsu-map',B='main',P='hokatsu-data.json',API=`https://api.github.com/repos/${O}/${R}/contents/${P}`,SK='hokatsu-v24-draft',TK='hokatsu-token';let state=[],sha=null,filter='all',sort='default';const $=id=>document.getElementById(id),esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function token(){return sessionStorage.getItem(TK)||''}function setStatus(t,type='ok'){$('sync').textContent=t;$('sync').dataset.type=type}function enc(s){let b=new TextEncoder().encode(s),x='';for(let i=0;i<b.length;i+=32768)x+=String.fromCharCode(...b.subarray(i,i+32768));return btoa(x)}function dec(s){let x=atob(s.replace(/\s/g,''));return new TextDecoder().decode(Uint8Array.from(x,c=>c.charCodeAt(0)))}function draft(){try{return JSON.parse(localStorage.getItem(SK))}catch{return null}}function saveDraft(){localStorage.setItem(SK,JSON.stringify(state));setStatus('端末下書き保存済','warning')}
async function load(){try{let h={'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'};if(token())h.Authorization='Bearer '+token();let r=await fetch(API+'?ref='+B,{headers:h,cache:'no-store'});if(!r.ok)throw Error('HTTP '+r.status);let p=await r.json();sha=p.sha;let base=JSON.parse(dec(p.content)),d=draft();state=base.map(x=>{let y=Array.isArray(d)&&d.find(z=>z.id===x.id);return y?{...x,...y}:x});setStatus(d?'GitHub正本＋端末下書きを読込':'GitHub正本を読込');render()}catch(e){setStatus('読込失敗: '+e.message,'error')}}
async function saveGit(){if(!token())return alert('GitHubトークンを入力してください');setStatus('GitHubへ保存中…','warning');let r=await fetch(API,{method:'PUT',headers:{'Accept':'application/vnd.github+json','Authorization':'Bearer '+token(),'X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json'},body:JSON.stringify({message:'Update hokatsu data',content:enc(JSON.stringify(state,null,2)),sha,branch:B})});if(!r.ok){setStatus('保存失敗 HTTP '+r.status,'error');return}let p=await r.json();sha=p.content.sha;localStorage.removeItem(SK);setStatus('GitHub正本へ保存しました');alert('保存しました')}
function mapurl(a,p){let q=encodeURIComponent(a);return p==='g'?`https://www.google.com/maps/search/?api=1&query=${q}`:`https://maps.apple.com/?q=${q}`}function cls(c){return c==='認可'?'認可':c==='認可（小規模）'?'小規模':'認可外'}
function evalHtml(x){let e=x.evaluationDetails;if(!e)return '<div class="note">見学評価資料は未登録です。</div>';let ul=a=>`<ul>${(a||[]).map(v=>`<li>${esc(v)}</li>`).join('')}</ul>`;return `<button class="evalbtn" data-e="${x.id}">見学評価を見る</button><div class="eval hidden" id="e-${x.id}"><h4>総合評価</h4><p>${esc(e.summary)}</p><h4>主な強み</h4>${ul(e.strengths)}<h4>主な懸念</h4>${ul(e.concerns)}<h4>家庭運用との適合性</h4><p>${esc(e.operations)}</p><h4>追加確認事項</h4>${ul(e.checkPoints)}</div>`}
function card(x,i){let stars=[1,2,3,4,5].map(n=>`<button class="${x.rating>=n?'on':''}" data-rate="${n}" data-id="${x.id}">★</button>`).join('');return `<article class="card"><div class="head"><span class="num">${i}</span><div><h3>${esc(x.name)}</h3><div class="badges"><span class="badge">${cls(x.category)}</span><span class="badge">${esc(x.visit)}</span></div></div></div><p class="address">${esc(x.address)}</p>${evalHtml(x)}<div class="field"><label>見学状況</label><div class="seg">${['未見学','見学予定','見学済'].map(v=>`<button data-visit="${v}" data-id="${x.id}" class="${x.visit===v?'active':''}">${v}</button>`).join('')}</div></div><div class="field"><label>評価</label><div class="stars">${stars}</div></div><div class="field"><label>志望順位</label><select data-rank="${x.id}"><option value="0">未定</option>${Array.from({length:20},(_,k)=>`<option value="${k+1}" ${x.rank==k+1?'selected':''}>第${k+1}希望</option>`).join('')}</select></div><div class="field"><label>メモ</label><textarea data-memo="${x.id}">${esc(x.memo)}</textarea></div><div class="fa"><a href="${mapurl(x.address,'g')}" target="_blank">Google</a><a href="${mapurl(x.address,'a')}" target="_blank">Apple</a></div></article>`}
function list(){let a=state.filter(x=>filter==='all'||x.category===filter||x.visit===filter);if(sort==='rank')a.sort((x,y)=>(x.rank||99)-(y.rank||99));if(sort==='rating')a.sort((x,y)=>y.rating-x.rating);if(sort==='visit'){let o={'見学済':0,'見学予定':1,'未見学':2};a.sort((x,y)=>o[x.visit]-o[y.visit])}return a}
function render(){let a=list();$('cards').innerHTML=a.map((x,i)=>card(x,i+1)).join('');$('count').textContent=a.length+'件';$('total').textContent=state.length;$('done').textContent=state.filter(x=>x.visit==='見学済').length;let rs=state.filter(x=>x.rating>0).map(x=>+x.rating);$('avg').textContent=rs.length?(rs.reduce((a,b)=>a+b,0)/rs.length).toFixed(1):'-';$('ranked').textContent=state.filter(x=>x.rank>0).length;$('ranklist').innerHTML=state.filter(x=>x.rank>0).sort((a,b)=>a.rank-b.rank).map(x=>`<li>第${x.rank}希望 ${esc(x.name)}</li>`).join('')||'<li>未設定</li>';$('progress').innerHTML=['認可','認可（小規模）','認可外・企業主導型'].map(c=>{let t=state.filter(x=>x.category===c),d=t.filter(x=>x.visit==='見学済').length,p=t.length?d/t.length*100:0;return `<div class="prog"><div class="progline"><span>${cls(c)}</span><span>${d}/${t.length}</span></div><div class="bar"><i style="width:${p}%"></i></div></div>`}).join('');bind()}
function update(id,p){let x=state.find(x=>x.id===id);Object.assign(x,p);saveDraft();render()}function bind(){document.querySelectorAll('[data-e]').forEach(b=>b.onclick=()=>{let p=$('e-'+b.dataset.e);p.classList.toggle('hidden');b.textContent=p.classList.contains('hidden')?'見学評価を見る':'見学評価を閉じる'});document.querySelectorAll('[data-visit]').forEach(b=>b.onclick=()=>update(b.dataset.id,{visit:b.dataset.visit}));document.querySelectorAll('[data-rate]').forEach(b=>b.onclick=()=>update(b.dataset.id,{rating:+b.dataset.rate}));document.querySelectorAll('[data-rank]').forEach(s=>s.onchange=()=>{let n=+s.value;if(n)state.forEach(x=>{if(x.id!==s.dataset.rank&&x.rank===n)x.rank=0});update(s.dataset.rank,{rank:n})});document.querySelectorAll('[data-memo]').forEach(t=>{let z;t.oninput=()=>{clearTimeout(z);z=setTimeout(()=>update(t.dataset.memo,{memo:t.value}),300)}})}
function mkTools(){let fs=[['all','全件'],['認可','認可'],['認可（小規模）','小規模'],['認可外・企業主導型','認可外'],['見学済','見学済'],['見学予定','見学予定'],['未見学','未見学']];$('filters').innerHTML=fs.map(([v,l])=>`<button data-f="${v}" class="${filter===v?'active':''}">${l}</button>`).join('');$('sorts').innerHTML=[['default','登録順'],['rank','志望順位'],['rating','評価'],['visit','見学状況']].map(([v,l])=>`<button data-s="${v}" class="${sort===v?'active':''}">${l}</button>`).join('');document.querySelectorAll('[data-f]').forEach(b=>b.onclick=()=>{filter=b.dataset.f;mkTools();render()});document.querySelectorAll('[data-s]').forEach(b=>b.onclick=()=>{sort=b.dataset.s;mkTools();render()})}
$('token').value=token();$('token').oninput=e=>sessionStorage.setItem(TK,e.target.value.trim());$('save').onclick=saveGit;$('reload').onclick=()=>{localStorage.removeItem(SK);load()};$('export').onclick=()=>{let u=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'})),a=document.createElement('a');a.href=u;a.download='hokatsu-data.json';a.click();URL.revokeObjectURL(u)};$('import').onclick=()=>$('file').click();$('file').onchange=async e=>{try{let d=JSON.parse(await e.target.files[0].text());state=state.map(x=>({...x,...(d.find(y=>y.id===x.id)||{})}));saveDraft();render()}catch{alert('読込失敗')}};mkTools();load();
</script></body></html>
